{% if samples %}
<table class="data-table">
    <thead>
        <tr>
            <th>Intencja</th>
            <th>Zdanie</th>
            <th>Akcja</th>
        </tr>
    </thead>
    <tbody>
        {% for sample in samples %}
        <tr>
            <td><strong>{{ sample.intent }}</strong></td>
            <td>{{ sample.sentence }}</td>
            <td>
                <button class="btn danger small" 
                        hx-delete="/admin/training/intents/{{ sample.id }}" 
                        hx-target="#intent-list-container">
                    🗑 Usuń
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>Brak próbek w bazie. Dodaj nową intencję powyżej.</p>
{% endif %}
