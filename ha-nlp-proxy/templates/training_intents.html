{% extends "base.html" %}
{% block title %}Trening Intencji - HA NLP Proxy{% endblock %}

{% block content %}
<h1>Trening Intencji</h1>

<div class="action-bar mb-4">
    <form hx-post="/admin/training/intents/add" hx-target="#intent-list-container" hx-indicator="#add-spinner" style="display:inline-block; margin-right:10px;">
        <input type="text" name="intent" placeholder="Nazwa intencji (np. HassTurnOn)" required>
        <input type="text" name="sentence" placeholder="Nowe zdanie treningowe..." required>
        <button type="submit" class="btn primary">
            Dodaj
            <span id="add-spinner" class="spinner htmx-indicator"></span>
        </button>
    </form>
    
    <button hx-post="/admin/training/run" hx-target="#training-log" class="btn warning" hx-indicator="#train-spinner-2">
        🔁 Przetrenuj modele
        <span id="train-spinner-2" class="spinner htmx-indicator"></span>
    </button>
</div>

<div id="intent-list-container">
    {% include "partials/intent_list.html" %}
</div>

<div class="mt-4">
    <h3>Log trenowania</h3>
    <pre id="training-log" class="log-container">Wciśnij "Przetrenuj modele" aby rozpocząć.</pre>
</div>
{% endblock %}
