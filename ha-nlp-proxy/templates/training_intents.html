{% extends "base.html" %}
{% block title %}Trening Intencji - HA NLP Proxy{% endblock %}

{% block content %}
<h1>Trening Intencji</h1>

<div class="split-layout">
    <div class="left-pane">
        <form method="GET" action="/admin/training/intents">
            <label>Wybierz intencję:</label>
            <select name="intent" onchange="this.form.submit()">
                <option value="">-- Wybierz --</option>
                {% for i in intents %}
                <option value="{{ i }}" {% if i == selected_intent %}selected{% endif %}>{{ i }}</option>
                {% endfor %}
            </select>
        </form>

        <form hx-post="/admin/training/intents/add" hx-target="#intent-list-container" class="mt-4">
            <input type="text" name="intent" value="{{ selected_intent }}" placeholder="Nowa intencja (lub wybrana)">
            <input type="text" name="sentence" placeholder="Nowe zdanie treningowe..." required>
            <button type="submit" class="btn primary">Dodaj</button>
        </form>
        
        <div class="mt-4">
            <button hx-post="/admin/training/run" hx-target="#training-log" class="btn warning">🔁 Przetrenuj modele</button>
        </div>
    </div>
    <div class="right-pane">
        <h3>Próbki</h3>
        <div id="intent-list-container">
            {% include "partials/intent_list.html" %}
        </div>
    </div>
</div>

<div class="mt-4">
    <h3>Log trenowania</h3>
    <pre id="training-log" class="log-container">Wciśnij "Przetrenuj modele" aby rozpocząć.</pre>
</div>
{% endblock %}
